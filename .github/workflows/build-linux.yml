name: Build Linux executable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tk/Tcl dev headers must be present BEFORE uv provisions Python, or the
      # managed interpreter's tkinter bindings don't link correctly (uv#7036).
      - name: Install system Tk/Tcl dev headers
        run: sudo apt-get update && sudo apt-get install -y tk-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Verify tkinter is importable
        run: uv run python -c "import tkinter"

      - name: Build with PyInstaller
        run: uv run pyinstaller --onefile --name verselog --console --paths src src/verselog/__main__.py

      - name: Verify the built binary runs
        run: |
          chmod +x dist/verselog
          ./dist/verselog --help
          if ./dist/verselog; then
            echo "expected a non-zero exit for missing --ship" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: verselog-linux
          path: dist/verselog
